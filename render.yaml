services:
  - type: web
    name: solarbilling
    env: dotnet
    plan: free
    branch: main
    buildCommand: dotnet restore && dotnet publish -c Release -o publish
    startCommand: dotnet ./publish/SolarBilling.dll
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: ASPNETCORE_URLS
        value: http://0.0.0.0:$PORT
      - key: ConnectionStrings__DefaultConnection
        sync: false
